name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff
      - name: Run Ruff Check
        run: ruff check .

  format:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Format Tools
        run: python -m pip install --upgrade pip ruff black
      - name: Check Ruff Format
        run: ruff format --check .
      - name: Check Black Format
        run: black --check .

  tests:
    name: Tests And Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Create Required Directories
        run: mkdir -p artifacts/models artifacts/metrics
      - name: Run Pytest
        run: pytest -v --cov=src --cov=backend --cov-report=term-missing --cov-report=xml
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Bandit
        run: python -m pip install --upgrade pip bandit
      - name: Run Bandit
        run: bandit -r src/prediction/ src/common/ backend/ frontend/

  dependency-vulnerabilities:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Dependencies For Audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt
      - name: Run pip-audit
        run: |
          pip-audit \
            --ignore-vuln PYSEC-2025-52 \
            --ignore-vuln CVE-2024-37059 \
            --ignore-vuln CVE-2025-11201 \
            --ignore-vuln CVE-2025-14279 \
            --ignore-vuln CVE-2025-10279 \
            --ignore-vuln CVE-2025-14287 \
            --ignore-vuln CVE-2026-2635 \
            --ignore-vuln CVE-2026-2033 \
            --ignore-vuln CVE-2025-15031 \
            --ignore-vuln CVE-2025-15381 \
            --ignore-vuln CVE-2025-15036 \
            --ignore-vuln CVE-2025-15379 \
            --ignore-vuln CVE-2026-0545 \
            --ignore-vuln CVE-2026-33866 \
            --ignore-vuln CVE-2026-33865

  structure:
    name: Structure Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Test Dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Create Required Directories
        run: mkdir -p artifacts/models artifacts/metrics
      - name: Run Structure Test
        run: pytest tests/test_project_structure.py -v

  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - tests
      - security
      - dependency-vulnerabilities
      - structure
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create Build Placeholder
        run: mkdir -p artifacts/models && touch artifacts/models/model_latest.joblib
      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: housing-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: housing-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke Test Backend Image
        run: |
          docker run -d --rm --name backend-smoke -e SKIP_MINIO_STARTUP=1 -p 8000:8000 housing-backend:ci
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend smoke test failed"
          docker logs backend-smoke || true
          exit 1
      - name: Stop Backend Smoke Container
        if: always()
        run: docker rm -f backend-smoke || true
      - name: Smoke Test Frontend Image
        run: |
          docker run -d --rm --name frontend-smoke -e BACKEND_URL=http://127.0.0.1:8000 -p 8501:8501 housing-frontend:ci
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8501 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend smoke test failed"
          docker logs frontend-smoke || true
          exit 1
      - name: Stop Frontend Smoke Container
        if: always()
        run: docker rm -f frontend-smoke || true
      - name: Scan Backend Image With Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: housing-backend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Scan Frontend Image With Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: housing-frontend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  deploy-staging:
    name: Publish Staging Images
    runs-on: ubuntu-latest
    needs:
      - docker-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Build Placeholder
        run: mkdir -p artifacts/models && touch artifacts/models/model_latest.joblib
      - name: Extract Docker Metadata For Backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=staging
            type=sha,prefix=sha-
      - name: Extract Docker Metadata For Frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=staging
            type=sha,prefix=sha-
      - name: Build And Push Backend Staging Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build And Push Frontend Staging Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-prod-images:
    name: Publish Production Images
    runs-on: ubuntu-latest
    needs:
      - docker-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Build Placeholder
        run: mkdir -p artifacts/models && touch artifacts/models/model_latest.joblib
      - name: Extract Docker Metadata For Backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=prod
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Extract Docker Metadata For Frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=prod
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Build And Push Backend Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build And Push Frontend Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - publish-prod-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
    env:
      RENDER_API: https://api.render.com/v1
      BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend:prod
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend:prod
    steps:
      - name: Check Required Secrets And Variables
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BACKEND_SERVICE_ID: ${{ vars.RENDER_BACKEND_SERVICE_ID }}
          RENDER_FRONTEND_SERVICE_ID: ${{ vars.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          missing=0
          if [ -z "$RENDER_BACKEND_SERVICE_ID" ]; then
            echo "::error::RENDER_BACKEND_SERVICE_ID non defini — GitHub Settings → Variables → Actions"
            missing=1
          fi
          if [ -z "$RENDER_FRONTEND_SERVICE_ID" ]; then
            echo "::error::RENDER_FRONTEND_SERVICE_ID non defini — GitHub Settings → Variables → Actions"
            missing=1
          fi
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY non defini — GitHub Settings → Secrets → Actions"
            missing=1
          fi
          [ "$missing" -eq 0 ] || exit 1

      - name: Prepare Deployment Variables
        run: |
          echo "--- Render Deployment Configuration ---"
          echo "Backend service  : ${{ vars.RENDER_BACKEND_SERVICE_ID }}"
          echo "Frontend service : ${{ vars.RENDER_FRONTEND_SERVICE_ID }}"
          echo "Backend image    : ${{ env.BACKEND_IMAGE }}"
          echo "Frontend image   : ${{ env.FRONTEND_IMAGE }}"

      - name: Trigger Backend Deploy
        id: backend-deploy
        run: |
          RESPONSE=$(curl -fsS -X POST \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${{ env.BACKEND_IMAGE }}\"}")
          echo "$RESPONSE"
          echo "id=$(echo "$RESPONSE" | jq -r '.id // empty')" >> "$GITHUB_OUTPUT"

      - name: Trigger Frontend Deploy
        id: frontend-deploy
        run: |
          RESPONSE=$(curl -fsS -X POST \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${{ env.FRONTEND_IMAGE }}\"}")
          echo "$RESPONSE"
          echo "id=$(echo "$RESPONSE" | jq -r '.id // empty')" >> "$GITHUB_OUTPUT"

      - name: Wait For Backend Deploy
        run: |
          DEPLOY_ID="${{ steps.backend-deploy.outputs.id }}"
          SERVICE_ID="${{ vars.RENDER_BACKEND_SERVICE_ID }}"
          echo "Polling backend deploy $DEPLOY_ID ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS \
              "${{ env.RENDER_API }}/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')
            echo "  [$i/30] status=$STATUS"
            case "$STATUS" in
              live)                   echo "Backend deploy live."; exit 0 ;;
              build_failed|\
              update_failed|\
              canceled|\
              pre_deploy_failed|\
              deactivated)            echo "Backend deploy failed : $STATUS"; exit 1 ;;
            esac
            sleep 20
          done
          echo "Timeout : backend deploy did not reach 'live' in 10 min."; exit 1

      - name: Wait For Frontend Deploy
        run: |
          DEPLOY_ID="${{ steps.frontend-deploy.outputs.id }}"
          SERVICE_ID="${{ vars.RENDER_FRONTEND_SERVICE_ID }}"
          echo "Polling frontend deploy $DEPLOY_ID ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS \
              "${{ env.RENDER_API }}/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')
            echo "  [$i/30] status=$STATUS"
            case "$STATUS" in
              live)                   echo "Frontend deploy live."; exit 0 ;;
              build_failed|\
              update_failed|\
              canceled|\
              pre_deploy_failed|\
              deactivated)            echo "Frontend deploy failed : $STATUS"; exit 1 ;;
            esac
            sleep 20
          done
          echo "Timeout : frontend deploy did not reach 'live' in 10 min."; exit 1

      - name: Get Service URLs
        id: urls
        run: |
          BACKEND_URL=$(curl -fsS \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_BACKEND_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '.serviceDetails.url // "see Render dashboard"')
          FRONTEND_URL=$(curl -fsS \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_FRONTEND_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '.serviceDetails.url // "see Render dashboard"')
          echo "backend=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND_URL" >> "$GITHUB_OUTPUT"

      - name: Write Deployment Summary
        run: |
          {
            echo "## Production Deployment"
            echo ""
            echo "| | Detail |"
            echo "| --- | --- |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
            echo "| **Backend image** | \`${{ env.BACKEND_IMAGE }}\` |"
            echo "| **Frontend image** | \`${{ env.FRONTEND_IMAGE }}\` |"
            echo "| **Backend URL** | ${{ steps.urls.outputs.backend }} |"
            echo "| **Frontend URL** | ${{ steps.urls.outputs.frontend }} |"
          } >> "$GITHUB_STEP_SUMMARY"
