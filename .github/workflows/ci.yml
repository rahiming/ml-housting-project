name: CI Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Vérification du Linting (Ruff)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .

  # 2. Vérification du Formatage (Black/Ruff)
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Format Tools
        run: pip install ruff black
      - name: Check Style
        run: |
          ruff format --check .
          black --check .

  # 3. Vérification de la Sécurité (Bandit)
  security:
    runs-on: ubuntu-latest
    needs: [lint, format, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Security Scan
        # Scan uniquement le code qui part en production
        run: bandit -r src/prediction/ src/common/ backend/ frontend/

  # 4. Tests unitaires et d'intégration
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Run Pytest
        run: |
          mkdir -p artifacts/models artifacts/metrics
          pytest -v --cov=src

  # 5. Vérification de la structure du projet
  structure:
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Pytest
        run: pip install pytest
      - name: Create required directories for structural check
        run: mkdir -p artifacts/models artifacts/metrics
      - name: Run Structure Check
        run: pytest tests/test_project_structure.py

  # 6. Build des images Docker pour valider la containerisation
  docker-build:
    runs-on: ubuntu-latest
    needs: [structure]
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend and Frontend Images
        run: |
          mkdir -p artifacts/models
          touch artifacts/models/model_latest.joblib
          docker build -t housing-backend -f backend/Dockerfile .
          docker build -t housing-frontend -f frontend/Dockerfile .