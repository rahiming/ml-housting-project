name: Production Deploy

# Déclenchement uniquement manuel depuis l'onglet Actions de GitHub.
# À lancer depuis la branche main après validation de la CI complète.
on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

# ─── Ce qu'il faut configurer avant de lancer ce workflow ─────────────────────
#
# ── 1. Dans Render (à faire une seule fois dans le dashboard) ─────────────────
#
#   a) Registry Credential pour GHCR
#      Account Settings → Registry Credentials → New Credential
#        Server   : ghcr.io
#        Username : <ton_github_actor>
#        Password : Personal Access Token GitHub (scope : read:packages)
#
#   b) Service backend  "Web Service" → Deploy → Existing Image
#        Image : ghcr.io/<repo>/backend:latest
#        Registry Credential : celle créée ci-dessus
#        Port : 8000
#
#   c) Service frontend  "Web Service" → Deploy → Existing Image
#        Image : ghcr.io/<repo>/frontend:latest
#        Registry Credential : celle créée ci-dessus
#        Port : 8501
#
#   d) Variables d'environnement à définir dans chaque service Render
#      (Service → Environment → Add Environment Variable)
#
#      Backend :
#        MINIO_ENDPOINT         ex: https://s3.amazonaws.com
#        MINIO_BUCKET_MODELS    ex: ml-models
#        MODEL_OBJECT_NAME      ex: model_latest.joblib
#        AB_TRAFFIC_B_PERCENT   ex: 50
#        MINIO_ACCESS_KEY       (marquer comme "Secret")
#        MINIO_SECRET_KEY       (marquer comme "Secret")
#
#      Frontend :
#        BACKEND_URL            ex: https://ml-housing-backend.onrender.com
#
#   e) Clé API Render
#      Account Settings → API Keys → Create API Key
#      → note l'ID de chaque service : Service → Settings → Service ID  (srv-xxxx)
#
# ── 2. Dans GitHub (Settings → Secrets and variables) ────────────────────────
#
#   Variables  (onglet Variables)
#     RENDER_BACKEND_SERVICE_ID    ex: srv-abc123def456
#     RENDER_FRONTEND_SERVICE_ID   ex: srv-xyz789ghi012
#
#   Secrets  (onglet Secrets)
#     RENDER_API_KEY               clé API générée à l'étape 1.e
#     MINIO_ACCESS_KEY             clé d'accès MinIO / S3
#     MINIO_SECRET_KEY             clé secrète MinIO / S3
#
# ─── Note MinIO ───────────────────────────────────────────────────────────────
#   Render n'héberge pas de stockage S3. Deux options pratiques :
#     - Cloudflare R2 (gratuit jusqu'à 10 Go, API S3-compatible, zéro egress)
#     - Backblaze B2  (gratuit jusqu'à 10 Go, compatible S3)
#   Dans les deux cas MINIO_ENDPOINT pointe vers leur endpoint S3 et les
#   variables MINIO_ACCESS_KEY / MINIO_SECRET_KEY utilisent leurs credentials.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  publish-images:
    name: Publish Production Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Build Placeholder
        run: mkdir -p artifacts/models && touch artifacts/models/model_latest.joblib
      - name: Extract Docker Metadata For Backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=prod
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Extract Docker Metadata For Frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=prod
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Build And Push Backend Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build And Push Frontend Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
    env:
      RENDER_API: https://api.render.com/v1
      BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend:prod
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend:prod
    steps:
      - name: Check Required Secrets And Variables
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BACKEND_SERVICE_ID: ${{ vars.RENDER_BACKEND_SERVICE_ID }}
          RENDER_FRONTEND_SERVICE_ID: ${{ vars.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          missing=0
          if [ -z "$RENDER_BACKEND_SERVICE_ID" ]; then
            echo "::error::RENDER_BACKEND_SERVICE_ID non defini — GitHub Settings → Variables → Actions"
            missing=1
          fi
          if [ -z "$RENDER_FRONTEND_SERVICE_ID" ]; then
            echo "::error::RENDER_FRONTEND_SERVICE_ID non defini — GitHub Settings → Variables → Actions"
            missing=1
          fi
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY non defini — GitHub Settings → Secrets → Actions"
            missing=1
          fi
          [ "$missing" -eq 0 ] || exit 1

      - name: Prepare Deployment Variables
        run: |
          echo "--- Render Deployment Configuration ---"
          echo "Backend service  : ${{ vars.RENDER_BACKEND_SERVICE_ID }}"
          echo "Frontend service : ${{ vars.RENDER_FRONTEND_SERVICE_ID }}"
          echo "Backend image    : ${{ env.BACKEND_IMAGE }}"
          echo "Frontend image   : ${{ env.FRONTEND_IMAGE }}"

      - name: Trigger Backend Deploy
        id: backend-deploy
        run: |
          RESPONSE=$(curl -fsS -X POST \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${{ env.BACKEND_IMAGE }}\"}")
          echo "$RESPONSE"
          echo "id=$(echo "$RESPONSE" | jq -r '.id // empty')" >> "$GITHUB_OUTPUT"

      - name: Trigger Frontend Deploy
        id: frontend-deploy
        run: |
          RESPONSE=$(curl -fsS -X POST \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${{ env.FRONTEND_IMAGE }}\"}")
          echo "$RESPONSE"
          echo "id=$(echo "$RESPONSE" | jq -r '.id // empty')" >> "$GITHUB_OUTPUT"

      # Les deux deploys sont declenchés simultanément ci-dessus.
      # On attend maintenant leur stabilisation l'un après l'autre.
      # Timeout : 30 × 20 s = 10 min par service.
      - name: Wait For Backend Deploy
        run: |
          DEPLOY_ID="${{ steps.backend-deploy.outputs.id }}"
          SERVICE_ID="${{ vars.RENDER_BACKEND_SERVICE_ID }}"
          echo "Polling backend deploy $DEPLOY_ID ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS \
              "${{ env.RENDER_API }}/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')
            echo "  [$i/30] status=$STATUS"
            case "$STATUS" in
              live)                   echo "Backend deploy live."; exit 0 ;;
              build_failed|\
              update_failed|\
              canceled|\
              pre_deploy_failed|\
              deactivated)            echo "Backend deploy failed : $STATUS"; exit 1 ;;
            esac
            sleep 20
          done
          echo "Timeout : backend deploy did not reach 'live' in 10 min."; exit 1

      - name: Wait For Frontend Deploy
        run: |
          DEPLOY_ID="${{ steps.frontend-deploy.outputs.id }}"
          SERVICE_ID="${{ vars.RENDER_FRONTEND_SERVICE_ID }}"
          echo "Polling frontend deploy $DEPLOY_ID ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS \
              "${{ env.RENDER_API }}/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')
            echo "  [$i/30] status=$STATUS"
            case "$STATUS" in
              live)                   echo "Frontend deploy live."; exit 0 ;;
              build_failed|\
              update_failed|\
              canceled|\
              pre_deploy_failed|\
              deactivated)            echo "Frontend deploy failed : $STATUS"; exit 1 ;;
            esac
            sleep 20
          done
          echo "Timeout : frontend deploy did not reach 'live' in 10 min."; exit 1

      - name: Get Service URLs
        id: urls
        run: |
          BACKEND_URL=$(curl -fsS \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_BACKEND_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '.serviceDetails.url // "see Render dashboard"')
          FRONTEND_URL=$(curl -fsS \
            "${{ env.RENDER_API }}/services/${{ vars.RENDER_FRONTEND_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            | jq -r '.serviceDetails.url // "see Render dashboard"')
          echo "backend=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND_URL" >> "$GITHUB_OUTPUT"

      - name: Write Deployment Summary
        run: |
          {
            echo "## Production Deployment"
            echo ""
            echo "| | Detail |"
            echo "| --- | --- |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
            echo "| **Backend image** | \`${{ env.BACKEND_IMAGE }}\` |"
            echo "| **Frontend image** | \`${{ env.FRONTEND_IMAGE }}\` |"
            echo "| **Backend URL** | ${{ steps.urls.outputs.backend }} |"
            echo "| **Frontend URL** | ${{ steps.urls.outputs.frontend }} |"
          } >> "$GITHUB_STEP_SUMMARY"
